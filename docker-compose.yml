# Local development infrastructure.
# Brings up the dependencies the backend needs.
# Usage:
#   docker compose up -d
#   docker compose down
# Data persists under ./infra/local-data/ (gitignored).

name: orbix-erp

services:
  mysql:
    # Using MariaDB (not vanilla MySQL) because the Flyway mysql/ migrations
    # use native CREATE SEQUENCE (MariaDB 10.3+) which vanilla MySQL doesn't
    # support. Hibernate is configured with MariaDBDialect to match.
    # Exposed on host port 3307 to avoid colliding with a host-installed
    # MariaDB on 3306.
    image: mariadb:11.4
    container_name: orbix-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootlocal}
      MARIADB_DATABASE: orbix_erp
      MARIADB_USER: orbix
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-orbixlocal}
    ports:
      - "3307:3306"
    volumes:
      - ./infra/local-data/mariadb:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # Modern TIMESTAMP semantics — avoids the implicit DEFAULT CURRENT_TIMESTAMP
      # on every bare TIMESTAMP column that the legacy MySQL/MariaDB default
      # bakes in.
      - --explicit-defaults-for-timestamp=ON
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 10

  phpmyadmin:
    # Web UI for the MariaDB above. Reachable at http://localhost:8081.
    # Auto-logs in as the orbix user; switch to root on the login screen
    # if you need to create users or databases. Host port is 8081 to keep
    # 8080 free for the Spring Boot backend's default Tomcat port.
    image: phpmyadmin:5
    container_name: orbix-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: orbix
      PMA_PASSWORD: ${MYSQL_PASSWORD:-orbixlocal}
      UPLOAD_LIMIT: 256M
    ports:
      - "8081:80"

  postgres:
    image: postgres:15
    container_name: orbix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbix_erp
      POSTGRES_USER: orbix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbixlocal}
    ports:
      - "5432:5432"
    volumes:
      - ./infra/local-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbix -d orbix_erp"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orbix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./infra/local-data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: orbix-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili-local-key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - ./infra/local-data/meilisearch:/meili_data

  minio:
    image: minio/minio:latest
    container_name: orbix-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: orbix
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-orbixlocal}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./infra/local-data/minio:/data
    command: server /data --console-address ":9001"
