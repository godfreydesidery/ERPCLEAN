spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/orbix_erp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:orbix}
    password: ${DB_PASSWORD:orbixlocal}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
  flyway:
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/mysql
