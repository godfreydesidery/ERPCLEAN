# Orbix Engine API — base configuration.
# DB-agnostic by design (ARCHITECTURE.md §2.3). Profile-specific overrides
# (application-mysql.yml / application-postgres.yml) supply the driver,
# URL, and Flyway dialect-specific paths.

spring:
  application:
    name: orbix-engine-api
  profiles:
    # Defaults to the local + mysql composition for developer convenience.
    default: local,mysql
  jpa:
    hibernate:
      ddl-auto: validate     # Production rule: never `update`. See ARCHITECTURE.md §2.3
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
    baseline-on-migrate: false
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false

server:
  port: 8081
  shutdown: graceful
  compression:
    enabled: true
  error:
    include-message: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Orbix-specific configuration.
orbix:
  jwt:
    issuer: orbix-engine
    # US-IAM-001: short access token (15 min) keeps the leak-blast-radius and
    # the stale-permission window tight; the refresh token (30 days) is
    # single-use and rotated on every use, so a stolen one is detected on reuse.
    access-ttl: PT15M
    refresh-ttl: P30D
    # Production: load RS256 keys from secret store. Local dev uses an in-memory key.
    signing-mode: ${JWT_SIGNING_MODE:dev-in-memory}
  search:
    meilisearch-url: ${MEILI_URL:http://localhost:7700}
    meilisearch-key: ${MEILI_MASTER_KEY:meili-local-key}
  outbox:
    dispatch-interval-ms: 1000
    batch-size: 100
    max-attempts: 10
  giftcard:
    # F7.1 — daily auto-expiry of gift cards past expires_at. Default 00:10 UTC.
    expiry-cron: "0 10 0 * * *"
  production:
    # F7.3b — yield variance gating on production output post.
    # Hard 422 when actual output > planned × this multiple (TC-PROD-011).
    yield-hard-reject-multiple: 2.0
    # Informational soft-warn band: |actual / planned − 1| > this fraction
    # surfaces a warning (TC-PROD-010). Currently surfaced via the response
    # payload only; future work routes it through the notifications channel.
    yield-soft-warn-fraction: 0.5
  orders:
    # F7.2 — default deposit-required percentage of total when the client
    # omits depositRequiredAmount on order create.
    deposit-required-pct: 30
    # Default reserved-until horizons (in days from create) when the client
    # omits reservedUntil. Layby keeps the goods for longer than a typical
    # production lead time.
    default-layby-reserve-days: 30
    default-pre-order-reserve-days: 7
    # Cancel-window: cancellations within this many days of create refund all
    # prior payments on their original tender; cancellations outside the window
    # forfeit the paid amount. Set to 0 to forfeit always (no-refund policy).
    cancel-refund-window-days: 7
    # Daily expiry sweep — runs at 00:15 UTC, ten minutes after the gift-card
    # sweep so logs don't interleave.
    expiry-cron: "0 15 0 * * *"
  stock:
    # FEFO expiry-flag job. Runs daily by default (cron: "0 5 0 * * *" = 00:05 UTC).
    batch-expiry-cron: "0 5 0 * * *"
    # Manual stock-adjustment monetary value above which an authoriser
    # (`authorised_by_user_id`, must hold `STOCK.ADJUST_APPROVE`) is required.
    # Currency-agnostic — denominated in the company's functional currency.
    adjustment-threshold: 50000
  procurement:
    # LPO total at or below this value auto-approves on submit (skips
    # PENDING_APPROVAL). Set to 0 to require approval for every LPO.
    lpo-auto-approval-threshold: 0
    # Allowable fractional difference between an invoice's total_amount and the
    # sum of its GRN allocations (0.005 = ±0.5%). Above this the match is
    # rejected — the operator must edit the allocations or the invoice totals.
    invoice-match-tolerance-pct: 0.005
  debt:
    write-off:
      # Slice G.2 — write-off amount at or below which the requester may
      # self-approve (status goes straight to POSTED) provided they also hold
      # DEBT.WRITE_OFF.APPROVE. Above this threshold a second distinct user
      # must approve (dual-control). Currency-agnostic: denominated in the
      # company's functional currency (TZS for Tanzania-first deploys).
      dual-approval-threshold: 100000
  sales:
    # Per-line discount percentage above which an authoriser holding
    # `SALES.DISCOUNT_APPROVE` is required. Set to 100 to disable.
    discount-threshold-pct: 10
  pos:
    # Absolute till-session variance (|declared - expected|) above which a
    # supervisor holding POS.SESSION_VARIANCE_APPROVE must authorise the close.
    session-variance-threshold: 1000
    # Per-line discount percentage above which a supervisor holding
    # POS.DISCOUNT_APPROVE must authorise the sale. Set to 100 to disable.
    discount-threshold-pct: 10
    # Refund total above which a supervisor holding POS.REFUND_APPROVE must
    # authorise the refund. Currency-agnostic (functional currency).
    refund-threshold: 10000
  sync:
    # Offline-sync spine (US-POS-017/018, docs/design/slice-sync-spine.md).
    # contract-version: the server's current sync contract major. Clients with
    # a lower major get 426; clients with a higher major get 409.
    contract-version: 1
    # Maximum ops per push batch (defence-in-depth on payload size).
    push-batch-max: 500
    # Maximum rows per dataset per pull page. Keeps long-offline reconnect from
    # returning a 50MB body. Client loops while hasMore=true.
    pull-page-size: 2000
    # Tombstone retention window (days). Archived/deleted rows are returned as
    # deletes in the pull delta for this long. A device offline longer than this
    # window gets CURSOR_EXPIRED (HTTP 409) and must bootstrap.
    # PM-approved default: 90 days (adequate for rural TZ tills).
    tombstone-days: 90
  flags:
    cache-ttl-seconds: 30

logging:
  level:
    root: INFO
    com.orbix.engine: DEBUG
    org.hibernate.SQL: WARN
