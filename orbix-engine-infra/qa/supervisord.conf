[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
# Tag stdout/stderr lines per program so the combined container log is readable.
silent=false
loglevel=info

[program:mariadb]
command=/usr/sbin/mariadbd --user=mysql --datadir=/var/lib/mysql
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10
stopsignal=TERM
stopwaitsecs=30

[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --appendonly no --save "" --protected-mode no
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

# Spring Boot is gated on MariaDB being reachable — the wrapper script waits
# for the local 3306 socket before exec'ing java, so this program is just
# allowed to fail-and-retry until MariaDB is up.
[program:api]
command=/opt/orbix/start-api.sh
autostart=true
autorestart=true
startretries=20
startsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
stopsignal=TERM
stopwaitsecs=20
