# QA overrides for the single-container deployment.
# Layered on top of application.yml + application-mysql.yml (loaded via
# SPRING_PROFILES_ACTIVE=mysql,qa). The DB and Redis are both 127.0.0.1
# because they run as supervisord children inside the same container.

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/orbix_erp?useSSL=false&connectionTimeZone=LOCAL&allowPublicKeyRetrieval=true
    username: orbix
    password: orbixlocal
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: 127.0.0.1
      port: 6379

logging:
  level:
    root: INFO
    com.orbix.engine: INFO
    org.hibernate.SQL: WARN
