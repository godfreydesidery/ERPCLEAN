openapi: 3.1.0
info:
  title: Orbix Engine API
  version: 0.1.0
  description: |
    Single source of truth for the Orbix Engine REST API.
    See PRD.md, ARCHITECTURE.md, DATA-MODEL.md for context.
  contact:
    name: Orbix Engineering
servers:
  - url: http://localhost:8081
    description: Local dev
  - url: https://api.orbix-engine.example
    description: Production (per deployment)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Money:
      type: string
      pattern: '^-?\d+(\.\d{1,4})?$'
      description: Decimal string with up to 4 fractional digits.
    Item:
      type: object
      required: [id, code, name, type, status]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string, maxLength: 40 }
        name: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [SELLABLE, CONSUMABLE, BOTH, SERVICE]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, ARCHIVED]
        avgCost: { $ref: '#/components/schemas/Money' }
        lastCost: { $ref: '#/components/schemas/Money' }
    CreateItemRequest:
      type: object
      required: [code, name, type, itemGroupId, uomId, vatGroupId]
      properties:
        code: { type: string, maxLength: 40 }
        name: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [SELLABLE, CONSUMABLE, BOTH, SERVICE]
        itemGroupId: { type: integer, format: int64 }
        uomId: { type: integer, format: int64 }
        vatGroupId: { type: integer, format: int64 }
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }

paths:
  /api/v1/ping:
    get:
      tags: [Platform]
      summary: Health probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  ok: { type: boolean }
                  at: { type: string, format: date-time }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Issue access + refresh tokens (US-IAM-001)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Token pair issued
        '401':
          description: Invalid credentials

  /api/v1/items:
    post:
      tags: [Catalog]
      summary: Create an item (US-CAT-001)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateItemRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '409':
          description: Item code already exists
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
